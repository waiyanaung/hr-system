name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push FastAPI image
        uses: docker/build-push-action@v5
        with:
          context: ./fastapi-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/hr-fastapi:${{ github.sha }}

      - name: Build and push Django image
        uses: docker/build-push-action@v5
        with:
          context: ./django-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/hr-django:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update image tags in k8s manifests
        run: |
          sed -i "s|IMAGE_TAG|${{ github.sha }}|g" k8s/fastapi-deployment.yaml
          sed -i "s|IMAGE_TAG|${{ github.sha }}|g" k8s/django-deployment.yaml

      - name: Commit updated manifests
        run: |
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add k8s/
          git commit -m "Update image tags to ${{ github.sha }}" || echo "No changes"
          git push