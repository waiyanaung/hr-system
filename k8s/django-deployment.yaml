apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: django-service
  template:
    metadata:
      labels:
        app: django-service
    spec:
      containers:
      - name: django
        image: waiyanaung/hr-django:latest
        ports:
        - containerPort: 8080
        env:
        - name: FASTAPI_URL
          value: http://fastapi-service:8000
---
apiVersion: v1
kind: Service
metadata:
  name: django-service
spec:
  type: NodePort
  selector:
    app: django-service
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080